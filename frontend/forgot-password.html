<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - WebAI Auditor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>body{font-family:'Inter',sans-serif}.gradient-text{background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.gradient-bg{background:linear-gradient(135deg,#3b82f6,#8b5cf6)}</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="index.html" class="flex items-center justify-center space-x-3">
                <div class="w-12 h-12 gradient-bg rounded-lg flex items-center justify-center">
                    <i class="fas fa-globe text-white text-xl"></i>
                </div>
                <span class="text-2xl font-bold gradient-text">WebAI Auditor</span>
            </a>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-key text-blue-600 text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold mb-2">Forgot Password?</h1>
                <p class="text-gray-500">No worries, we'll send you reset instructions</p>
            </div>

            <form id="resetForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                    <div class="relative">
                        <input type="email" id="email" required placeholder="you@example.com" class="w-full px-4 py-3 pl-12 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <i class="fas fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    </div>
                </div>
                <button type="submit" class="w-full py-3 gradient-bg text-white rounded-lg font-semibold hover:opacity-90">
                    Send Reset Link
                </button>
            </form>

            <p class="text-center mt-8 text-gray-600">
                <a href="login.html" class="text-blue-600 font-semibold hover:text-blue-700">
                    <i class="fas fa-arrow-left mr-2"></i>Back to Login
                </a>
            </p>
        </div>

        <!-- Footer Links -->
        <div class="text-center mt-8 text-sm text-gray-500">
            <a href="privacy.html" class="hover:text-gray-700">Privacy Policy</a>
            <span class="mx-2">•</span>
            <a href="terms.html" class="hover:text-gray-700">Terms of Service</a>
        </div>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;

            try {
                const response = await fetch('http://localhost:8000/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (response.ok) {
                    alert('Password reset link sent to your email!');
                    window.location.href = 'login.html';
                } else {
                    alert('Failed to send reset link. Please try again.');
                }
            } catch (error) {
                console.error('Reset error:', error);
                alert('Failed to send reset link. Please try again.');
            }
        });
    </script>
</body>
</html>
